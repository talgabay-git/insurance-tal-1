<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>עמוד לא נמצא | טל גבאי תכנון פיננסי</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--navy);
      text-align: center;
      padding: 2rem;
    }
    .error-inner { max-width: 500px; }
    .error-code {
      font-size: clamp(5rem, 20vw, 10rem);
      font-weight: 900;
      color: var(--gold);
      line-height: 1;
      margin-bottom: 1rem;
    }
    .error-title {
      font-size: clamp(1.4rem, 4vw, 2rem);
      color: var(--white);
      font-weight: 700;
      margin-bottom: 1rem;
    }
    .error-text {
      color: rgba(255,255,255,0.65);
      margin-bottom: 2.5rem;
      font-size: 1.05rem;
      line-height: 1.7;
    }
    .error-logo {
      margin-bottom: 3rem;
      color: var(--white);
      font-size: 1.1rem;
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: .5rem;
    }
    .error-logo span { color: var(--gold); }
  </style>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5F91Q1DPZV"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-5F91Q1DPZV', { 'anonymize_ip': true });
  </script>
</head>
<body>
  <div class="error-page">
    <div class="error-inner">
      <a href="index.html" class="error-logo">
        <strong>טל גבאי</strong> <span>|</span> תכנון פיננסי
      </a>
      <div class="error-code">404</div>
      <h1 class="error-title">העמוד לא נמצא</h1>
      <p class="error-text">
        העמוד שחיפשת אינו קיים או הועבר למיקום אחר.<br>
        ניתן לחזור לדף הבית ולמצוא את המידע שאתה מחפש.
      </p>
      <a href="index.html" class="btn btn-gold btn-lg">
        <i class="fa-solid fa-house"></i> חזרה לדף הבית
      </a>
    </div>
  </div>

  <!-- ===== COOKIE CONSENT BANNER ===== -->
  <div id="cookie-banner" role="dialog" aria-label="הסכמה לעוגיות" aria-live="polite" style="display:none;position:fixed;bottom:0;right:0;left:0;z-index:99999;background:#0d1e35;color:#fff;padding:1rem 1.5rem;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:.75rem;box-shadow:0 -2px 12px rgba(0,0,0,.35);font-family:'Heebo',sans-serif;font-size:.92rem;line-height:1.5;">
    <p style="margin:0;flex:1 1 260px;">אתר זה משתמש ב<strong>Google Analytics</strong> לצורך ניתוח תנועת גולשים בלבד. לא נאסף מידע אישי מזהה. <a href="privacy-policy.html" style="color:#c9a84c;text-decoration:underline;">מדיניות פרטיות</a></p>
    <div style="display:flex;gap:.6rem;flex-shrink:0;">
      <button id="cookie-accept" style="background:#c9a84c;color:#0d1e35;border:none;border-radius:6px;padding:.45rem 1.1rem;font-weight:700;cursor:pointer;font-size:.9rem;">אני מסכים</button>
      <button id="cookie-decline" style="background:transparent;color:rgba(255,255,255,.65);border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:.45rem 1.1rem;cursor:pointer;font-size:.9rem;">דחה</button>
    </div>
  </div>
  <script>
  (function(){
    var b=document.getElementById('cookie-banner');
    var consent=localStorage.getItem('cookie-consent');
    if(!consent) b.style.display='flex';
    document.getElementById('cookie-accept').addEventListener('click',function(){
      localStorage.setItem('cookie-consent','accepted');
      b.style.display='none';
    });
    document.getElementById('cookie-decline').addEventListener('click',function(){
      localStorage.setItem('cookie-consent','declined');
      b.style.display='none';
      // disable GA
      window['ga-disable-G-5F91Q1DPZV']=true;
    });
    // if previously declined, disable GA
    if(consent==='declined') window['ga-disable-G-5F91Q1DPZV']=true;
  })();
  </script>
</body>
</html>
