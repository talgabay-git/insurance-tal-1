name: Daily Backup

on:
  schedule:
    - cron: '0 6 * * *'  # כל יום ב-06:00 UTC (09:00 ישראל)
  workflow_dispatch:       # אפשרות להפעיל ידנית

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create ZIP backup
        run: |
          DATE=$(date +%Y-%m-%d)
          zip -r "backup-${DATE}.zip" . \
            --exclude ".git/*" \
            --exclude ".github/*"
          echo "Backup created: backup-${DATE}.zip"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: backup-${{ github.run_id }}
          path: backup-*.zip
          retention-days: 30
