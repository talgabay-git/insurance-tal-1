name: Daily Backup

on:
  schedule:
    - cron: '0 6 * * *'  # כל יום ב-06:00 UTC (09:00 ישראל)
  workflow_dispatch:       # אפשרות להפעיל ידנית

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create ZIP backup
        run: |
          DATE=$(date +%Y-%m-%d)
          zip -r "backup-${DATE}.zip" . \
            --exclude ".git/*" \
            --exclude ".github/*"
          echo "DATE=${DATE}" >> $GITHUB_ENV

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: backup-${{ env.DATE }}
          path: backup-*.zip
          retention-days: 30

      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "גיבוי יומי — אתר pf-invest.co.il — ${{ env.DATE }}"
          to: tal@pf-invest.co.il
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            שלום טל,

            הגיבוי היומי של האתר pf-invest.co.il בוצע בהצלחה בתאריך ${{ env.DATE }}.

            להורדת הגיבוי:
            https://github.com/talgabay-git/insurance-tal-1/actions/runs/${{ github.run_id }}

            לחץ על הקישור → גלול למטה → תחת "Artifacts" הורד את הקובץ.

            בברכה,
            מערכת הגיבוי האוטומטית
